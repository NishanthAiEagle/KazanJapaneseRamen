<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Japanese Cuisine — AR Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--washi:#faf6ef;--washi-dark:#f0e8d8;--ink:#1a0f00;--ink-mid:#3d2010;--ink-light:#7a5535;--ink-faint:#b08858;
--crimson:#8b1818;--crimson-mid:#c0282a;--crimson-lt:#e84040;
--gold:#9a7820;--gold-lt:#c8a832;--gold-pale:#f0d880;
--sage:#4a6741;--sage-lt:#daeac8;
--deep:#0e0804;
--easing:cubic-bezier(0.22,1,0.36,1);
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--washi);font-family:'Noto Sans JP',sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── PARTICLE CANVAS ── */
#sakura-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45;}

/* ── HEADER ── */
.site-header{
  position:relative;overflow:hidden;
  background:linear-gradient(170deg,#0e0804 0%,#1e1208 40%,#150c06 70%,#0e0804 100%);
  color:#faf6ef;text-align:center;
  padding:3rem 1rem 3.5rem;
}
.header-bg-pattern{
  position:absolute;inset:0;
  background-image:radial-gradient(circle at 20% 80%,rgba(139,24,24,.22) 0%,transparent 55%),
    radial-gradient(circle at 80% 20%,rgba(154,120,32,.16) 0%,transparent 50%),
    radial-gradient(circle at 50% 50%,rgba(255,255,255,.02) 0%,transparent 60%);
  pointer-events:none;
}
.header-grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(154,120,32,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(154,120,32,.04) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridDrift 20s linear infinite;
}
@keyframes gridDrift{to{background-position:60px 60px}}

.header-glow{
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(192,40,42,.15) 0%,transparent 70%);
  animation:glowPulse 4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes glowPulse{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}

.header-border-top{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--crimson-mid),var(--gold-lt),var(--crimson-mid),transparent);}
.header-border-bot{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(192,40,42,.5),transparent);}

.header-mon{
  width:64px;height:64px;border:1px solid rgba(200,168,50,.35);border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;position:relative;
  animation:monSpin 25s linear infinite;
}
.header-mon::before{content:'✿';font-size:30px;color:var(--crimson-mid);animation:monSpin 25s linear infinite reverse;}
.header-mon-ring{position:absolute;inset:-8px;border:1px dashed rgba(200,168,50,.18);border-radius:50%;animation:monSpin 40s linear infinite reverse;}
@keyframes monSpin{to{transform:rotate(360deg)}}

.header-eyebrow{font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:10px;color:rgba(245,237,224,.35);margin-bottom:14px;}
.header-title{
  font-family:'Cinzel',serif;font-size:clamp(36px,7vw,64px);font-weight:600;letter-spacing:.1em;line-height:1;
  background:linear-gradient(135deg,#faf6ef 20%,var(--gold-pale) 50%,#faf6ef 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;animation:shimmerTitle 5s ease-in-out infinite alternate;
}
@keyframes shimmerTitle{from{background-position:0% 50%}to{background-position:100% 50%}}
.header-title-jp{font-family:'Noto Serif JP',serif;font-size:clamp(16px,3.5vw,24px);font-weight:300;color:rgba(245,237,224,.5);letter-spacing:.4em;display:block;margin-bottom:20px;}
.brush-divider{width:160px;height:1px;background:linear-gradient(90deg,transparent,var(--crimson-mid),var(--gold-lt),var(--crimson-mid),transparent);margin:0 auto 18px;position:relative;}
.brush-divider::before,.brush-divider::after{content:'◆';position:absolute;top:50%;transform:translateY(-50%);font-size:6px;color:var(--gold-lt);}
.brush-divider::before{left:22px}.brush-divider::after{right:22px}
.header-sub{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(245,237,224,.32);margin-bottom:22px;}
.ar-badge{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(200,168,50,.25);padding:8px 22px;font-size:11px;letter-spacing:2px;color:rgba(245,237,224,.5);background:rgba(154,120,32,.07);border-radius:2px;}
.ar-dot{width:7px;height:7px;border-radius:50%;background:var(--crimson-mid);animation:dotPulse 2s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(192,40,42,.4)}50%{opacity:.3;box-shadow:0 0 0 6px rgba(192,40,42,0)}}

.lang-bar{margin-bottom:22px;position:relative;z-index:20;}
#lang-select{background:rgba(245,237,224,.07);color:rgba(245,237,224,.65);border:1px solid rgba(200,168,50,.22);border-radius:2px;padding:8px 14px;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;outline:none;letter-spacing:1px;transition:border-color .2s,background .2s;}
#lang-select:hover{border-color:rgba(200,168,50,.5);background:rgba(245,237,224,.12);}
#lang-select option{background:#1a0f00;color:#faf6ef;}

.funzone-btn{position:absolute;top:max(env(safe-area-inset-top),1rem);right:1rem;z-index:30;display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--crimson),var(--gold));color:#faf6ef;text-decoration:none;padding:8px 16px;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;letter-spacing:1px;transition:transform .2s,box-shadow .2s;}
.funzone-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,24,24,.5);}

/* ── TABS ── */
.tabs-wrap{
  position:sticky;top:0;z-index:100;
  background:rgba(250,246,239,.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(139,24,24,.15);
  padding:0 1rem;
}
.tabs-inner{max-width:760px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:10px 0;}
.tabs-inner::-webkit-scrollbar{display:none;}
.tab-btn{
  flex-shrink:0;padding:7px 20px;border:1px solid rgba(139,24,24,.15);background:transparent;
  color:var(--ink-faint);font-family:'Noto Sans JP',sans-serif;font-size:12px;letter-spacing:1.5px;
  cursor:pointer;white-space:nowrap;border-radius:2px;
  transition:all .25s var(--easing);position:relative;overflow:hidden;
}
.tab-btn::after{content:'';position:absolute;inset:0;background:var(--crimson);transform:scaleX(0);transform-origin:left;transition:transform .25s var(--easing);z-index:-1;}
.tab-btn:hover{border-color:var(--crimson);color:var(--crimson);}
.tab-btn.active{background:var(--crimson);color:#faf6ef;border-color:var(--crimson);box-shadow:0 3px 14px rgba(139,24,24,.35);}
.tab-btn.active::after{transform:scaleX(1);}

/* ── MAIN ── */
.main{max-width:760px;margin:0 auto;padding:1.5rem 1rem 6rem;position:relative;z-index:1;}
.state-box{text-align:center;padding:5rem 1rem;color:var(--ink-faint);}
.spinner{width:38px;height:38px;border:2px solid rgba(139,24,24,.12);border-top-color:var(--crimson);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-box p{font-size:13px;font-family:'Noto Serif JP',serif;letter-spacing:2px;}

.section-label{display:flex;align-items:center;gap:14px;margin:2.5rem 0 1.2rem;font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--crimson);}
.section-label span{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(139,24,24,.25),transparent);}
.section-label::before{content:'◈';font-size:10px;color:var(--gold);flex-shrink:0;}

/* ── CARDS ── */
.items-grid{display:flex;flex-direction:column;gap:12px;}
.menu-card{
  background:rgba(255,253,248,.85);
  border:1px solid rgba(139,24,24,.1);
  border-left:3px solid transparent;
  padding:1.2rem 1.4rem;cursor:pointer;
  transition:border-color .3s,transform .35s var(--easing),box-shadow .35s var(--easing),background .3s,opacity .5s;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  animation:cardReveal .5s var(--easing) both;
}
@keyframes cardReveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.menu-card::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,rgba(139,24,24,0) 0%,rgba(139,24,24,.04) 100%);
  opacity:0;transition:opacity .3s;
}
.menu-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--crimson),transparent);
  transform:scaleX(0);transition:transform .35s var(--easing);
}
.menu-card:hover{
  border-left-color:var(--crimson);transform:translateX(6px);
  box-shadow:-5px 0 0 var(--crimson),4px 8px 28px rgba(26,15,0,.13);
  background:rgba(255,253,250,.98);
}
.menu-card:hover::before{opacity:1;}
.menu-card:hover::after{transform:scaleX(1);}

.card-row{display:flex;gap:16px;align-items:flex-start;}
.card-thumb{
  width:72px;height:72px;flex-shrink:0;border-radius:2px;
  background:linear-gradient(135deg,var(--washi-dark),#e8d8c0);
  border:1px solid rgba(139,24,24,.12);
  display:flex;align-items:center;justify-content:center;font-size:34px;
  position:relative;overflow:hidden;
  transition:transform .35s var(--easing),box-shadow .35s;
}
.menu-card:hover .card-thumb{transform:scale(1.06);box-shadow:0 4px 16px rgba(26,15,0,.18);}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.ar-pill{position:absolute;bottom:2px;right:2px;background:var(--crimson);color:#faf6ef;font-size:7px;letter-spacing:1px;padding:2px 6px;font-family:'Cinzel',serif;}
.card-body{flex:1;min-width:0;}
.name-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:5px;}
.dish-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink);letter-spacing:.02em;}
.dish-jp{font-family:'Noto Serif JP',serif;font-size:12px;font-weight:300;color:var(--ink-faint);letter-spacing:1.5px;}
.tags-row{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0 8px;}
.tag{font-size:10px;padding:2px 10px;font-family:'Noto Sans JP',sans-serif;font-weight:500;letter-spacing:.5px;border-radius:1px;}
.tag-veg{background:var(--sage-lt);color:var(--sage);border:1px solid rgba(74,103,65,.2);}
.tag-new{background:rgba(139,24,24,.07);color:var(--crimson);border:1px solid rgba(139,24,24,.2);}
.tag-dotd{background:rgba(154,120,32,.09);color:var(--gold);border:1px solid rgba(154,120,32,.25);}
.dish-desc{font-size:12.5px;color:var(--ink-light);line-height:1.7;margin-bottom:12px;font-family:'Noto Sans JP',sans-serif;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.dish-price{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--ink);}
.price-sym{font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--ink-faint);margin-right:1px;}
.ar-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--ink);color:#faf6ef;border:none;padding:9px 18px;
  font-family:'Noto Sans JP',sans-serif;font-size:11px;letter-spacing:1.5px;
  cursor:pointer;min-height:44px;border-radius:1px;
  position:relative;overflow:hidden;transition:box-shadow .2s;
}
.ar-btn::before{content:'';position:absolute;inset:0;background:var(--crimson);transform:scaleX(0);transform-origin:left;transition:transform .25s var(--easing);}
.ar-btn:hover::before{transform:scaleX(1);}
.ar-btn:hover{box-shadow:0 5px 18px rgba(139,24,24,.45);}
.ar-btn>*{position:relative;z-index:1;}
.ar-btn svg{width:13px;height:13px;flex-shrink:0;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(8,4,0,.9);z-index:9000;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
@media(min-width:540px){.modal-overlay{align-items:center;padding:1.5rem;}}
.modal-overlay.open{display:flex;}
.modal-card{
  background:var(--washi);border-top:3px solid var(--crimson);
  width:100%;max-width:540px;max-height:94svh;overflow-y:auto;
  overscroll-behavior:contain;position:relative;
  animation:sheetUp .35s var(--easing);
}
@media(min-width:540px){.modal-card{border-top:none;border:1px solid rgba(139,24,24,.2);border-radius:2px;animation:modalIn .3s var(--easing);}}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(12px)}to{opacity:1;transform:none}}
.modal-viewer-wrap{width:100%;height:320px;background:linear-gradient(155deg,#100806 0%,#1e1008 55%,#100806 100%);position:relative;overflow:hidden;}
.modal-viewer-wrap::before{content:'';position:absolute;inset:14px;border:1px solid rgba(200,168,50,.15);pointer-events:none;z-index:3;}
.modal-viewer-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(8,4,0,.4));pointer-events:none;z-index:2;}
model-viewer{display:block;width:100%;height:320px;background:transparent;--progress-bar-color:#b8860b;--progress-mask:transparent;touch-action:none;}
.modal-close{position:absolute;top:14px;right:14px;width:38px;height:38px;background:rgba(8,4,0,.55);border:1px solid rgba(200,168,50,.2);color:rgba(245,237,224,.65);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;transition:background .15s,border-color .15s;border-radius:1px;}
.modal-close:hover{background:var(--crimson);border-color:var(--crimson);color:#faf6ef;}
.mv-ar-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(14,8,4,.92);border:1px solid var(--gold);padding:5px 16px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;color:var(--gold-pale);opacity:0;transition:opacity .4s,transform .4s;pointer-events:none;z-index:4;white-space:nowrap;}
.mv-ar-badge.visible{opacity:1;transform:translateX(-50%) translateY(0);}
.scale-info{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(14,8,4,.8);border:1px solid rgba(200,168,50,.18);padding:4px 16px;font-family:'Noto Sans JP',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(245,237,224,.4);text-transform:uppercase;white-space:nowrap;z-index:4;pointer-events:none;}
.modal-body{padding:1.6rem 1.8rem 2.2rem;}
.modal-name{font-family:'Cinzel',serif;font-size:28px;font-weight:600;letter-spacing:.05em;color:var(--ink);margin-bottom:3px;}
.modal-jp{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:300;color:var(--ink-faint);letter-spacing:3px;margin-bottom:14px;}
.modal-desc{font-size:13.5px;color:var(--ink-light);line-height:1.8;padding:14px 18px;border-left:3px solid var(--crimson);background:rgba(139,24,24,.035);margin-bottom:20px;font-family:'Noto Sans JP',sans-serif;}
.modal-footer{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid rgba(139,24,24,.12);}
.modal-price{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--ink);}

.menu-card.unavailable{opacity:.35;pointer-events:none;}
.site-footer{text-align:center;padding:2rem 1rem;font-size:11px;letter-spacing:2px;color:var(--ink-faint);border-top:1px solid rgba(139,24,24,.12);line-height:2.2;font-family:'Noto Serif JP',serif;background:rgba(250,246,239,.6);position:relative;z-index:1;}
.site-footer::before{content:'✿  ✿  ✿';display:block;color:var(--crimson);opacity:.35;font-size:14px;letter-spacing:8px;margin-bottom:10px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(139,24,24,.25);border-radius:2px;}
</style>
</head>
<body>

<canvas id="sakura-canvas"></canvas>

<header class="site-header">
  <div class="header-bg-pattern"></div>
  <div class="header-grid"></div>
  <div class="header-glow"></div>
  <div class="header-border-top"></div>
  <div class="header-border-bot"></div>
  <a href="FunZone.html" class="funzone-btn">🎮 FunZone</a>
  <div class="lang-bar">
    <select id="lang-select">
      <option value="en">English</option>
      <option value="jp">日本語</option>
      <option value="kn">ಕನ್ನಡ</option>
      <option value="ta">தமிழ்</option>
      <option value="ml">മലയാളം</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>
  <div class="header-mon"><div class="header-mon-ring"></div></div>
  <p class="header-eyebrow">日本料理</p>
  <h1 class="header-title">Japanese Cuisine</h1>
  <span class="header-title-jp">日本料理</span>
  <div class="brush-divider"></div>
  <p class="header-sub" id="ui-sub-tag">Authentic Japanese Cuisine</p>
  <span class="ar-badge"><span class="ar-dot"></span><span id="ui-ar-badge">Interactive 3D &amp; AR Preview</span></span>
</header>

<nav class="tabs-wrap" aria-label="Menu categories">
  <div class="tabs-inner" id="tabs-inner"></div>
</nav>

<main class="main">
  <div class="state-box" id="loading-state">
    <div class="spinner"></div>
    <p id="ui-loading">読み込み中…</p>
  </div>
  <div id="items-container" style="display:none"></div>
</main>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-viewer-wrap" id="modal-viewer-wrap">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <div class="mv-ar-badge" id="mv-ar-badge">✦ AR Ready</div>
      <div class="scale-info" id="scale-info">Actual portion size</div>
    </div>
    <div class="modal-body">
      <h2 class="modal-name" id="modal-name"></h2>
      <p class="modal-jp" id="modal-jp"></p>
      <div class="tags-row" id="modal-tags"></div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-footer">
        <div class="modal-price" id="modal-price"></div>
        <div class="tags-row" id="modal-tags2"></div>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer">
  Tap any dish to view in 3D &nbsp;·&nbsp; Prices in ₹ &nbsp;·&nbsp; 🌿 Vegetarian friendly<br>
  <span style="opacity:.45;font-size:10px;">AR requires a compatible mobile device · Model size reflects actual portion</span>
</footer>

<script>
/* ── SAKURA PARTICLE SYSTEM ── */
(function(){
  const c=document.getElementById('sakura-canvas');
  const ctx=c.getContext('2d');
  let W,H,petals=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COLORS=['rgba(192,40,42,','rgba(220,80,80,','rgba(240,160,150,','rgba(200,168,50,','rgba(245,200,180,'];
  function spawnPetal(){
    return{
      x:Math.random()*W,y:-12,
      r:Math.random()*5+3,
      rot:Math.random()*Math.PI*2,
      rotSpd:(Math.random()-.5)*.04,
      vx:(Math.random()-.5)*1.2,
      vy:Math.random()*.8+.4,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:Math.random()*.6+.3,
      sway:Math.random()*Math.PI*2,
      swaySpd:Math.random()*.02+.01,
    };
  }
  for(let i=0;i<55;i++){const p=spawnPetal();p.y=Math.random()*H;petals.push(p);}
  function drawPetal(p){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color+'1)';
    ctx.beginPath();
    ctx.ellipse(0,0,p.r*1.6,p.r,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  function tick(){
    ctx.clearRect(0,0,W,H);
    for(const p of petals){
      p.sway+=p.swaySpd;p.x+=p.vx+Math.sin(p.sway)*.5;p.y+=p.vy;p.rot+=p.rotSpd;
      if(p.y>H+12){Object.assign(p,spawnPetal());}
      drawPetal(p);
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

/* ── INTERSECTION OBSERVER for card stagger ── */
const cardObserver=new IntersectionObserver(entries=>{
  entries.forEach((e,i)=>{if(e.isIntersecting){e.target.style.animationDelay=(i*.04)+'s';e.target.style.animationPlayState='running';cardObserver.unobserve(e.target);}});
},{threshold:.08});

function getLocalAssets(dishName){
  const key=(dishName||'').toLowerCase().trim();
  const entry=LOCAL_ASSETS[key];
  if(!entry)return{posterPath:DISH_IMAGES[key]||'',glbPath:''};
  const base=`${ASSETS_BASE}/${entry.folder}/${entry.file}`;
  return{posterPath:DISH_IMAGES[key]||`${base}.png`,glbPath:`${base}.glb`,usdzPath:`${base}.usdz`,scale:entry.scale};
}

  rice:{en:'Mains',jp:'メイン',kn:'ಮುಖ್ಯ ಆಹಾರ',ta:'முக்கிய உணவு',ml:'പ്രധാന ഭക്ഷണം',te:'ప్రధాన వంటకాలు'},
  drinks:{en:'Desserts',jp:'デザート',kn:'ಸಿಹಿತಿಂಡಿಗಳು',ta:'இனிப்புகள்',ml:'ഡെസേർട്ടുകൾ',te:'తీపి వంటకాలు'},
};

let allDishes=[],rawRows=[],activeCategory='all',currentLang='en';
const isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

function parseCSV(text){
  const lines=text.trim().split('\n');if(lines.length<2)return[];
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(line=>{const vals=splitLine(line),obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();});return obj;});
}
function splitLine(line){const result=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'&&!inQ){inQ=true;continue;}if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else{inQ=false;}continue;}if(ch===','&&!inQ){result.push(cur);cur='';continue;}cur+=ch;}result.push(cur);return result;}

function rowToDish(row){
  const truthy=v=>['true','yes','1'].includes((v||'').toLowerCase());
  const sfx=currentLang!=='en'?`_${currentLang}`:'';
  const desc=row[`description${sfx}`]||row['description']||'';
  const name=row[`name${sfx}`]||row['name']||'';
  const local=getLocalAssets(row['name']||name);
  return{
    id:row['id']||'',name,category:(row['category']||'other').toLowerCase(),
    jp:row['jp_name']||'',desc,price:parseInt(row['price']||'0',10),
    veg:truthy(row['veg']),dotd:truthy(row['dish of the day']||row['dotd']),
    isNew:truthy(row['new']),available:truthy(row['available']),
    glbPath:local.glbPath,usdzPath:local.usdzPath,posterPath:local.posterPath,scale:local.scale,
    emoji:EMOJI_MAP[(row['name']||'').toLowerCase()]||'🍽️',
  };
}

function tagHTML(d){
  const t=I18N[currentLang]||I18N.en;
  return[d.veg?`<span class="tag tag-veg">🌿 ${t.veg}</span>`:''
    ,d.isNew?'<span class="tag tag-new">新 new</span>':''
    ,d.dotd?'<span class="tag tag-dotd">★ chef\'s pick</span>':''].join('');
}
function catLabel(cat){const map=CAT_LABELS[cat];return map?(map[currentLang]||map.en):(cat.charAt(0).toUpperCase()+cat.slice(1));}

function renderTabs(){
  const cats=['all',...new Set(allDishes.map(d=>d.category))];
  const wrap=document.getElementById('tabs-inner');
  wrap.innerHTML=cats.map(c=>`<button class="tab-btn${c===activeCategory?' active':''}" data-cat="${c}">${catLabel(c)}</button>`).join('');
  wrap.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{activeCategory=btn.dataset.cat;renderTabs();renderItems();}));
}

const SVG_CUBE=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;

let cardDelay=0;
function cardHTML(d,idx){
  const thumbContent=d.posterPath
    ?`<img src="${d.posterPath}" alt="${d.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;font-size:32px;width:100%;height:100%;align-items:center;justify-content:center;">${d.emoji}</span>`
    :`<span style="font-size:32px;">${d.emoji}</span>`;
  return`<div class="menu-card${d.available?'':' unavailable'}" data-id="${d.id}" role="button" tabindex="0" aria-label="View ${d.name}" style="animation-delay:${idx*.06}s;animation-play-state:paused">
    <div class="card-row">
      <div class="card-thumb">${thumbContent}${d.glbPath?'<span class="ar-pill">AR</span>':''}</div>
      <div class="card-body">
        <div class="name-row"><span class="dish-name">${d.name}</span>${d.jp?`<span class="dish-jp">${d.jp}</span>`:''}</div>
        <div class="tags-row">${tagHTML(d)}</div>
        <p class="dish-desc">${d.desc}</p>
        <div class="card-footer">
          <div class="dish-price"><span class="price-sym">₹</span>${d.price.toLocaleString('en-IN')}</div>
          ${d.glbPath?`<button class="ar-btn" data-id="${d.id}">${SVG_CUBE} View in AR</button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function renderItems(){
  const filtered=activeCategory==='all'?allDishes:allDishes.filter(d=>d.category===activeCategory);
  const container=document.getElementById('items-container');
  let idx=0;
  if(activeCategory==='all'){
    const grouped={};
    filtered.forEach(d=>{(grouped[d.category]=grouped[d.category]||[]).push(d);});
    container.innerHTML=Object.entries(grouped).map(([cat,items])=>
      `<div class="section-label"><span></span>${catLabel(cat)}<span></span></div>
       <div class="items-grid">${items.map(d=>cardHTML(d,idx++)).join('')}</div>`
    ).join('');
  }else{
    container.innerHTML=`<div class="items-grid">${filtered.map((d,i)=>cardHTML(d,i)).join('')}</div>`;
  }
  container.querySelectorAll('.menu-card').forEach(card=>{
    cardObserver.observe(card);
    card.addEventListener('click',()=>openModal(card.dataset.id));
  });
  container.querySelectorAll('.ar-btn').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();openModal(btn.dataset.id);}));
}

function openModal(id){
  const d=allDishes.find(x=>x.id===id);if(!d)return;
  document.getElementById('modal-name').textContent=d.name;
  document.getElementById('modal-jp').textContent=d.jp;
  document.getElementById('modal-desc').textContent=d.desc;
  document.getElementById('modal-price').innerHTML=`<span style="font-family:'Noto Sans JP',sans-serif;font-size:15px;color:var(--ink-faint)">₹</span>${d.price.toLocaleString('en-IN')}`;
  document.getElementById('modal-tags').innerHTML=tagHTML(d);
  document.getElementById('modal-tags2').innerHTML=tagHTML(d);
  const arBadge=document.getElementById('mv-ar-badge');
  const scaleInfo=document.getElementById('scale-info');
  arBadge.classList.remove('visible');scaleInfo.textContent='';
  const vw=document.getElementById('modal-viewer-wrap');
  vw.querySelectorAll('.modal-photo,model-viewer,.no-model,.mv-ar-btn-wrap').forEach(el=>el.remove());
  const photoWrap=document.createElement('div');
  photoWrap.className='modal-photo';
  photoWrap.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;';
  if(d.posterPath){
    photoWrap.innerHTML=`<img src="${d.posterPath}" alt="${d.name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;font-size:80px;align-items:center;justify-content:center;width:100%;height:100%;">${d.emoji}</span>`;
  }else{photoWrap.innerHTML=`<span style="font-size:80px;">${d.emoji}</span>`;}
  vw.insertBefore(photoWrap,arBadge);
  if(d.glbPath){
    const arBtnWrap=document.createElement('div');
    arBtnWrap.className='mv-ar-btn-wrap';
    arBtnWrap.style.cssText='position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:10px;align-items:center;';
    arBtnWrap.innerHTML=`<button class="modal-ar-launch-btn" style="display:inline-flex;align-items:center;gap:8px;background:var(--crimson);color:#faf6ef;border:none;padding:12px 26px;font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:2.5px;cursor:pointer;white-space:nowrap;min-height:44px;box-shadow:0 5px 20px rgba(139,24,24,.5);transition:transform .2s,box-shadow .2s;">✦ View On Table</button>`;
    vw.insertBefore(arBtnWrap,arBadge);
    arBtnWrap.querySelector('.modal-ar-launch-btn').addEventListener('click',()=>loadModelAndAR(d,vw,arBadge,scaleInfo,arBtnWrap,photoWrap));
    arBtnWrap.querySelector('.modal-ar-launch-btn').addEventListener('mouseenter',e=>{e.target.style.transform='translateY(-2px)';e.target.style.boxShadow='0 8px 28px rgba(139,24,24,.6)';});
    arBtnWrap.querySelector('.modal-ar-launch-btn').addEventListener('mouseleave',e=>{e.target.style.transform='';e.target.style.boxShadow='0 5px 20px rgba(139,24,24,.5)';});
  }
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function loadModelAndAR(d,vw,arBadge,scaleInfo,arBtnWrap,photoWrap){
  const btn=arBtnWrap.querySelector('.modal-ar-launch-btn');
  btn.disabled=true;btn.innerHTML=`<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(245,237,224,.3);border-top-color:#faf6ef;border-radius:50%;animation:spin .8s linear infinite;"></span> 読込中…`;
  const mv=document.createElement('model-viewer');
  mv.setAttribute('src',d.glbPath);
  if(isIOS&&d.usdzPath)mv.setAttribute('ios-src',d.usdzPath);
  const s=d.scale.toFixed(6);
  mv.setAttribute('scale',`${s} ${s} ${s}`);
  mv.setAttribute('camera-orbit','0deg 70deg 1.5m');mv.setAttribute('min-camera-orbit','auto 70deg 1.5m');mv.setAttribute('max-camera-orbit','auto 70deg 1.5m');
  mv.setAttribute('disable-zoom','');mv.setAttribute('ar','');mv.setAttribute('ar-modes','webxr scene-viewer quick-look');mv.setAttribute('ar-placement','floor');mv.setAttribute('ar-scale','fixed');mv.setAttribute('camera-controls','');mv.setAttribute('shadow-intensity','1');mv.setAttribute('environment-image','neutral');mv.setAttribute('exposure','1.1');mv.setAttribute('interaction-prompt','none');mv.setAttribute('loading','eager');mv.setAttribute('reveal','auto');
  mv.style.cssText='position:absolute;inset:0;width:100%;height:100%;background:transparent;touch-action:none;z-index:-1;opacity:0;pointer-events:none;';
  vw.insertBefore(mv,arBadge);
  mv.addEventListener('load',()=>{mv.activateAR();mv.addEventListener('ar-status',e=>{if(e.detail.status==='failed'||e.detail.status==='not-presenting'){btn.disabled=false;btn.innerHTML='✦ View in AR';mv.remove();}},{once:true});});
  mv.addEventListener('error',()=>{btn.disabled=false;btn.innerHTML='⚠ Retry';mv.remove();});
}

function closeModal(){
  const mvEl=document.querySelector('#modal-viewer-wrap model-viewer');
  if(mvEl&&typeof mvEl.pause==='function')mvEl.pause();
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
  document.querySelectorAll('#modal-viewer-wrap .modal-photo,#modal-viewer-wrap model-viewer,#modal-viewer-wrap .mv-ar-btn-wrap').forEach(el=>el.remove());
  document.getElementById('mv-ar-badge').classList.remove('visible');
}

document.addEventListener('visibilitychange',()=>{const mvEl=document.querySelector('#modal-viewer-wrap model-viewer');if(!mvEl)return;document.hidden?(typeof mvEl.pause==='function'&&mvEl.pause()):(typeof mvEl.play==='function'&&mvEl.play());});
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

document.getElementById('lang-select').addEventListener('change',e=>{
  currentLang=e.target.value;const t=I18N[currentLang]||I18N.en;
  document.getElementById('ui-sub-tag').textContent=t.sub;
  document.getElementById('ui-ar-badge').textContent=t.badge;
  document.getElementById('ui-loading').textContent=t.loading;
  allDishes=rawRows.map(rowToDish).filter(d=>d.name);
  renderTabs();renderItems();
});

async function init(){
  const loadingEl=document.getElementById('loading-state');
  const container=document.getElementById('items-container');
  try{
    const res=await fetch(CSV_URL);if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();rawRows=parseCSV(text);
    allDishes=rawRows.map(rowToDish).filter(d=>d.name);
    if(!allDishes.length)throw new Error('No dishes found.');
    loadingEl.style.display='none';container.style.display='block';
    renderTabs();renderItems();
  }catch(err){
    console.error('Menu load error:',err);
    loadingEl.innerHTML=`<p style="color:var(--crimson);font-family:'Cinzel',serif;letter-spacing:2px;margin-bottom:10px">Could not load menu</p><p style="font-size:13px;line-height:1.9;color:var(--ink-light)">Make sure your sheet is published:<br><strong>File → Share → Publish to web → CSV</strong><br><br>Sheet ID:<br><code style="background:var(--washi-dark);padding:3px 8px;font-size:11px">${SHEET_ID}</code></p>`;
  }
}
init();
</script>
